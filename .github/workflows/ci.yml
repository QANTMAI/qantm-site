name: CI

# Guards the canonical Qantm AI site. On every PR (and push to main) it proves
# the case-studies data is real and that the committed HTML is exactly what
# build.py generates — so a bad edit, or an edit that forgets to rebuild, can't
# ship. A weekly job re-checks that every case-study source URL still resolves.
#
# Room to expand: add steps under `build` (HTML validation, link check, image
# budget) or new jobs below — each is independent.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC — live source-link check

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify case-studies provenance gate
        run: python3 data/verify_case_studies.py

      - name: Build the site
        run: python3 build.py

      - name: Ensure generated pages are committed (no drift)
        run: |
          if ! git diff --exit-code; then
            echo "::error::build.py output differs from the committed files."
            echo "Run 'python3 build.py' locally and commit the regenerated pages."
            exit 1
          fi

  linkcheck:
    name: Source links resolve (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Every case-study referenceUrl still resolves
        run: python3 data/verify_case_studies.py --live
